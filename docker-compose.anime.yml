version: '3.8'

services:
  anime:
    image: myhomeapp-anime:${BUILD_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/anime/Dockerfile
      args:
        - BUILD_DATE=2026-03-07-v1
    ports:
      - "12351:3000"
    volumes:
      - /volume4/root4/AppData/MyHomeApp-v2/database/anime:/app/data
      - /volume4/root4/AppData/MyHomeApp-v2/config:/app/config
      - /volume4/root4/AppData/MyHomeApp-v2/logs/anime:/app/logs
    environment:
      - NODE_ENV=production
      - DATA_PATH=/app/data
      - CONFIG_PATH=/app/config
      - LOGS_PATH=/app/logs
      - CRON_SECRET=mysecretcronjobkey
    restart: unless-stopped
    container_name: myhomeapp-v2-anime
    user: "0:0"

  anime-cron:
    image: alpine:latest
    depends_on:
      - anime
    command: >
      sh -c "apk add --no-cache curl && printf '0 2 * * * curl -s -X POST -H \"Authorization: Bearer mysecretcronjobkey\" -H \"Content-Type: application/json\" -d \"{\\\"origin\\\":\\\"anime cron job\\\"}\" http://anime:3000/api/actions/perform-tasks\n' > /etc/crontabs/root && crond -f -d 8"
    restart: unless-stopped
    container_name: myhomeapp-v2-anime-cron
