version: '3.8'

services:
  portal:
    image: myhomeapp-portal:${BUILD_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        - BUILD_DATE=2026-03-07-v1
    ports:
      - "12350:3000"
    environment:
      - NODE_ENV=production
      - ANIME_URL=http://syno:12351
      - SAVINGS_URL=http://syno:12352
      - RAG_URL=http://syno:12353
    restart: unless-stopped
    container_name: myhomeapp-v2-portal
    networks:
      - myhomeapp-v2

networks:
  myhomeapp-v2:
    external: true
